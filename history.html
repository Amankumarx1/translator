<!-- Main Content -->
<main class="ml-64 p-12 max-w-6xl mx-auto">
  <header class="mb-12">
    <h1 class="text-4xl font-extrabold tracking-tight text-on-surface mb-2">Translation History</h1>
    <p class="text-on-surface-variant font-medium">Revisit your past translations and track your linguistic journey.</p>
    <div id="clearButtonContainer"></div>
  </header>

  <div class="space-y-6" id="historyContainer">
    <!-- History items will be populated here -->
  </div>

</main>

<script src="auth.js"></script>
<script>
  requireAuth();
  initAuthUI();
  document.getElementById('logoutLink')?.addEventListener('click', (e) => { e.preventDefault(); logout(); });

  const historyContainer = document.getElementById('historyContainer');
  const clearButtonContainer = document.getElementById('clearButtonContainer');

  async function loadHistory() {
    let historyData = JSON.parse(localStorage.getItem('atelier_history') || '[]');
    const user = getCurrentUser();

    if (user && user.email) {
      try {
        const response = await fetch(`${BASE_URL}/api/user/data?email=${encodeURIComponent(user.email)}`);
        if (response.ok) {
          const data = await response.json();
          if (data.success && data.history && data.history.length > 0) {
            historyData = data.history;
            localStorage.setItem('atelier_history', JSON.stringify(historyData));
          }
        }
      } catch (err) {
        console.warn('Could not load history from server:', err.message);
      }
    }

    renderHistory(historyData);
  }

  function renderHistory(historyData) {
    if (historyData.length > 0) {
      clearButtonContainer.innerHTML = '<button onclick="clearAllHistory()" class="mt-4 px-4 py-2 bg-error text-on-error rounded-lg hover:bg-error/80 transition-colors">Clear All History</button>';
    }

    if (historyData.length === 0) {
      historyContainer.innerHTML = '<div class="bg-surface-container-lowest p-6 rounded-xl shadow-sm"><p class="text-on-surface-variant italic">No translation history yet. Start translating to build your history!</p></div>';
    } else {
      historyContainer.innerHTML = historyData.map((item, index) => `
        <div class="bg-surface-container-lowest p-6 rounded-xl shadow-sm">
          <div class="flex justify-between items-start mb-4">
            <div class="flex-1">
              <p class="text-sm text-on-surface-variant mb-2">Input (${new Date(item.timestamp).toLocaleString()})</p>
              <p class="text-on-surface font-medium mb-4">${item.input}</p>
              <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                ${Object.entries(item.results).map(([lang, text]) => {
                  const langObj = typeof SUPPORTED_LANGUAGES !== 'undefined' ? SUPPORTED_LANGUAGES.find(l => l.code === lang) : null;
                  const langName = langObj ? langObj.name : lang.toUpperCase();
                  return `
                    <div class="bg-surface-container-low p-4 rounded-lg">
                      <span class="text-xs font-bold text-on-surface-variant uppercase tracking-wider">${langName}</span>
                      <p class="text-sm text-on-surface mt-1">${text}</p>
                    </div>
                  `;
                }).join('')}
              </div>
            </div>
            <div class="ml-4 flex flex-col items-center gap-2">
              <div class="flex items-center gap-1 rounded-full bg-surface-container-high px-3 py-2 text-xs font-semibold text-primary">
                <span class="material-symbols-outlined text-sm">bolt</span>
                <span>${item.engine === 'azure' ? 'Azure' : item.engine === 'google' ? 'Google' : 'Engine'}</span>
              </div>
              <button onclick="deleteHistoryItem(${index})" class="p-2 text-on-surface-variant hover:text-error transition-colors">
                <span class="material-symbols-outlined">delete</span>
              </button>
            </div>
          </div>
        </div>
      `).join('');
    }
  }

  function deleteHistoryItem(index) {
    const h = JSON.parse(localStorage.getItem('atelier_history') || '[]');
    h.splice(index, 1);
    localStorage.setItem('atelier_history', JSON.stringify(h));
    location.reload();
  }

  function clearAllHistory() {
    if (confirm('Are you sure you want to clear all translation history?')) {
      localStorage.removeItem('atelier_history');
      location.reload();
    }
  }

  loadHistory();
</script>
